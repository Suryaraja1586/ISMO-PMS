services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ismo_pm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ismo_pm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ismo_pm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express Backend API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ismo_pm_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/ismo_pm"
      PORT: 5000
      JWT_SECRET: "change_this_to_a_long_random_secret_in_production"
      FRONTEND_URL: "http://localhost:3000"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy  # waits until DB passes health check

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: ismo_pm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
